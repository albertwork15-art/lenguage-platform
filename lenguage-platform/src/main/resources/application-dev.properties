# Mi desarrollo local: H2 en mi memoria (sin instalar PostgreSQL).
spring.flyway.enabled=false

spring.datasource.url=jdbc:h2:mem:lenguage;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# Logging para mi desarrollo
logging.level.root=INFO
logging.level.com.SafariTalk=DEBUG
logging.level.org.springframework.web=INFO
