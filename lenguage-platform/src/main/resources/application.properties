spring.application.name=lenguage-platform

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.flyway.enabled=false

app.security.jwt.secret=${APP_SECURITY_JWT_SECRET}
app.security.jwt.expiration-ms=86400000

# Mis checks de salud de Actuator (para saber si mi servicio está vivo)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Mi prevención de abusos: Limito el tamaño máximo de body/archivos (Max 5MB) a nivel de mi app
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.tomcat.max-http-form-post-size=5MB
