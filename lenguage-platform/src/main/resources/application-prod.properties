# Produccion: mis credenciales SOLO por entorno (no commiteo valores reales).
# Mi BD debe existir y el esquema debe coincidir con mis entidades (validate). Sin tablas, el arranque falla hasta Flyway o un create inicial.
# SPRING_DATASOURCE_URL=jdbc:postgresql://host:5432/nombre_bd
# SPRING_DATASOURCE_USERNAME=...
# SPRING_DATASOURCE_PASSWORD=...
# JWT: APP_SECURITY_JWT_SECRET (minimo 32 caracteres para HS256)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.flyway.enabled=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

# Mi configuración de red (Reverse Proxy)
# Permite a mi app Spring Boot confiar en las cabeceras X-Forwarded-Proto u X-Forwarded-For
# enviadas por Nginx o Caddy (esencial para redirecciones HTTPS o cookies seguras).
server.forward-headers-strategy=framework

# Mi logging estricto para produccion
logging.level.root=WARN
logging.level.com.SafariTalk=INFO
