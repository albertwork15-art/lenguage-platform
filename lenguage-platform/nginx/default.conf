# nginx/default.conf - Ejemplo de configuración de Nginx como Reverse Proxy con SSL

# Definir zona de rate limit (10 peticiones por segundo por IP) para mitigar fuerza bruta
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name midominio.com;
    
    # Redirigir todo el tráfico HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name midominio.com;

    # Rutas a tus certificados SSL (Ej: generados por Let's Encrypt/Certbot)
    ssl_certificate /etc/nginx/ssl/live/midominio.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/midominio.com/privkey.pem;

    # Validacion WAF básica: Limitar el tamaño de body aceptado por el proxy a 5MB
    client_max_body_size 5M;

    location / {
        # Aplicamos rate limit (permite picos inmediatos de hasta 20 peticiones)
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://app:8080;
        
        # Cabeceras críticas para que Spring Boot identifique el protocolo HTTPS correcto
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
